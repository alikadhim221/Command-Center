<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية المتداولين | وحدة التحكم الموحدة</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #030308;
            --text-main: #F8F8FF;
            --text-muted: #888899;
            --glass-bg: rgba(15, 15, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --clr-1: #FFD700; --clr-2: #39FF14; --clr-3: #FF3131;
            --clr-4: #00FFFF; --clr-5: #BD00FF; --clr-6: #FF5E00;
            --clr-7: #00FF95; --clr-8: #FF007F; --clr-9: #EDEDED;
            --active-color: #39FF14;
        }

        body {
            font-family: 'Cairo', sans-serif; background-color: var(--bg-base); color: var(--text-main);
            margin: 0; padding: 20px; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, rgba(40, 40, 60, 0.2), transparent 80%);
            display: flex; flex-direction: column;
        }

        .view { display: none; animation: fadeIn 0.4s ease-in-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* لوحة الأقسام الرئيسية */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 40px auto; width: 100%; }
        .nav-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 30px 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card-icon { font-size: 3rem; margin-bottom: 15px; }
        .card-title { font-size: 1.5rem; font-weight: 900; }

        /* حاوية التفاصيل العملاقة */
        .detail-container { max-width: 98%; margin: 0 auto; width: 100%; display: flex; flex-direction: column; height: 92vh; }
        .btn-back { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-family: 'Cairo'; margin-bottom: 15px; align-self: flex-start; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-back:hover { background: rgba(255,255,255,0.1); }
        
        .detail-glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 35px; flex-grow: 1; display: flex; flex-direction: column; box-shadow: 0 15px 40px rgba(0,0,0,0.6); overflow: hidden; }
        
        .detail-header { display: flex; align-items: center; gap: 20px; font-size: 2.5rem; font-weight: 900; margin-bottom: 25px; border-bottom: 2px solid rgba(255,255,255,0.05); padding-bottom: 20px; }

        /* القائمة الموحدة بتصميم العمودين (Dual-Column Grid) */
        .master-list-wrapper { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding-right: 10px; 
            margin-bottom: 25px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            align-content: start; 
        }
        .master-list-wrapper::-webkit-scrollbar { width: 6px; }
        .master-list-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        @media (max-width: 900px) {
            .master-list-wrapper { grid-template-columns: 1fr; }
        }

        /* تصميم البطاقة (المهمة/الملاحظة) */
        .item-row { display: flex; align-items: center; justify-content: space-between; gap: 15px; background: rgba(255,255,255,0.03); padding: 15px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; border-right: 4px solid var(--active-color); height: fit-content; }
        .item-row:hover { background: rgba(255,255,255,0.06); transform: translateY(-2px); }
        
        /* حالة الإنجاز (Toggled) */
        .item-row.is-done { opacity: 0.4; filter: grayscale(100%); border-right-color: transparent; }
        .item-row.is-done .item-text { text-decoration: line-through; color: var(--text-muted); }

        /* اليمين: علامة الجيك والنص */
        .item-main { display: flex; align-items: flex-start; gap: 12px; flex: 1; }
        .item-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: var(--active-color); margin-top: 4px; }
        .item-text { color: #fff; font-size: 1.1rem; line-height: 1.5; font-weight: 700; word-break: break-word; }
        
        /* اليسار: أزرار التحكم (تم / حذف) */
        .item-actions { display: flex; align-items: center; gap: 8px; }
        .btn-action { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        
        .btn-done { background: rgba(57, 255, 20, 0.1); color: var(--clr-2); }
        .btn-done:hover { background: var(--clr-2); color: #000; }
        
        .btn-delete { background: rgba(255, 50, 50, 0.1); color: #ff4444; }
        .btn-delete:hover { background: #ff4444; color: #fff; }

        /* منطقة الإدخال في الأسفل */
        .input-footer { display: flex; gap: 15px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border); }
        .input-footer input { flex: 1; background: transparent; border: none; color: #fff; font-family: 'Cairo'; font-size: 1.2rem; outline: none; }
        .input-footer button { background: var(--active-color); color: #000; border: none; padding: 12px 40px; border-radius: 12px; font-weight: 900; font-family: 'Cairo'; font-size: 1.2rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .input-footer button:hover { opacity: 0.9; transform: scale(1.02); }

    </style>
</head>
<body>

    <div id="dashboard-view" class="view active">
        <div class="cards-grid" id="sections-grid"></div>
    </div>

    <div id="detail-view" class="view">
        <div class="detail-container">
            <button class="btn-back" onclick="exitSection()"><i class="fas fa-chevron-right"></i> العودة للوحة القيادة</button>
            <div class="detail-glass-panel">
                
                <div class="detail-header" id="header-el">
                    <i id="header-icon"></i> <span id="header-title"></span>
                </div>

                <div class="master-list-wrapper" id="master-list">
                    </div>

                <div class="input-footer">
                    <input type="text" id="master-input" placeholder="أضف مهمة، ملاحظة، أو أمر استراتيجي جديد هنا...">
                    <button id="btn-add-main" onclick="addNewItem()"><i class="fas fa-plus-circle"></i> إضافة</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const initialSetup = {
            1: ["فحص بوابات الدفع وتأكيد استلام المبالغ.", "تفعيل حسابات الوكالة (IB) وربطها بالعملاء.", "عزل المشترين فوراً في الجروب المغلق.", "متابعة من سحبوا السلة (Cart Abandonment)."],
            2: ["إدارة جلسات التداول الحي في الجروب المغلق.", "المراقبة الصارمة للـ Drawdown واستبعاد المخالفين.", "إصدار لوحة الصدارة (Leaderboard) أسبوعياً.", "تحديد الفائزين النهائيين المؤهلين للسفر."],
            3: ["تصوير لقطات الهوك الحقيقية في السيت أب.", "مونتاج الريلز بـ After Effects والـ Zoom In/Out.", "توثيق المعسكر (فندق، قطار، تخييم) بجودة سينمائية.", "إنتاج الفلوقات اليومية للتسويق الفيروسي."],
            4: ["حجز تذاكر الطيران وتأشيرات الدخول.", "حجز مقصورات قطار النوم للتوثيق الميداني.", "توفير حلول إنترنت 5G وبنوك طاقة للتخييم."],
            5: ["كتابة سكربتات محتوى جذابة (FOMO وتعليمي).", "التواصل مع شركات التمويل لرعايات (B2B).", "نشر الريلز مع الوصف والهاشتاكات المستهدفة."],
            6: ["تخطيط الجولات السياحية في تايلند.", "تنسيق فعاليات ليلية لكسر ضغط التداول."],
            7: ["تصميم وطباعة تيشرتات الإمبراطورية.", "تجهيز حقائب ترحيبية (Welcome Kits)."],
            8: ["الرد على استفسارات المشترين 24/7.", "الدعم التقني لفتح حسابات الوكالة."],
            9: ["إدارة التحركات اليومية للفريق في تايلند.", "وضع خطة طوارئ (Plan B) لانقطاع الإنترنت."]
        };

        const config = {
            1: { title: "المالية والمبيعات", icon: "fa-wallet", color: "var(--clr-1)" },
            2: { title: "البرنامج التدريبي", icon: "fa-graduation-cap", color: "var(--clr-2)" },
            3: { title: "التصوير والإنتاج", icon: "fa-video", color: "var(--clr-3)" },
            4: { title: "العمليات والحجوزات", icon: "fa-map-marked-alt", color: "var(--clr-4)" },
            5: { title: "التسويق والرعايات", icon: "fa-ad", color: "var(--clr-5)" },
            6: { title: "البرنامج الترفيهي", icon: "fa-umbrella-beach", color: "var(--clr-6)" },
            7: { title: "المطبوعات والهوية", icon: "fa-print", color: "var(--clr-7)" },
            8: { title: "المتطوعون", icon: "fa-user-friends", color: "var(--clr-8)" },
            9: { title: "المنسق الميداني", icon: "fa-user-shield", color: "var(--clr-9)" }
        };

        let currentID = null;
        let empireData = JSON.parse(localStorage.getItem('empire_master_data')) || initialSetup;
        let statusData = JSON.parse(localStorage.getItem('empire_status_data')) || {};

        function init() {
            const grid = document.getElementById('sections-grid');
            for (let id in config) {
                const s = config[id];
                const card = document.createElement('div');
                card.className = 'nav-card';
                card.style.borderTop = `5px solid ${s.color}`;
                card.innerHTML = `<div class="card-icon" style="color: ${s.color};"><i class="fas ${s.icon}"></i></div><div class="card-title">${s.title}</div>`;
                card.onclick = () => enterSection(id);
                grid.appendChild(card);
            }
        }

        function enterSection(id) {
            currentID = id;
            document.getElementById('dashboard-view').classList.remove('active');
            document.getElementById('detail-view').classList.add('active');
            
            const s = config[id];
            document.documentElement.style.setProperty('--active-color', s.color);
            
            document.getElementById('header-icon').className = `fas ${s.icon}`;
            document.getElementById('header-title').innerText = s.title;
            document.getElementById('header-el').style.color = s.color;
            document.getElementById('btn-add-main').style.backgroundColor = s.color;
            document.getElementById('btn-add-main').style.color = "#000";
            
            renderMasterList();
        }

        function exitSection() {
            currentID = null;
            document.getElementById('detail-view').classList.remove('active');
            document.getElementById('dashboard-view').classList.add('active');
        }

        function renderMasterList() {
            const list = document.getElementById('master-list');
            list.innerHTML = "";
            const items = empireData[currentID] || [];

            items.forEach((text, index) => {
                const key = `${currentID}-${text}`;
                const isDone = statusData[key] ? 'is-done' : '';
                const isChecked = statusData[key] ? 'checked' : '';

                list.innerHTML += `
                    <div class="item-row ${isDone}" id="row-${index}">
                        <div class="item-main">
                            <input type="checkbox" class="item-checkbox" ${isChecked} onchange="toggleItem('${text}')">
                            <span class="item-text">${text}</span>
                        </div>
                        <div class="item-actions">
                            <button class="btn-action btn-done" onclick="toggleItem('${text}')" title="تحديد كمنجز"><i class="fas fa-check"></i></button>
                            <button class="btn-action btn-delete" onclick="removeItem(${index})" title="حذف نهائي"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            });
            list.scrollTop = list.scrollHeight;
        }

        function addNewItem() {
            const input = document.getElementById('master-input');
            const val = input.value.trim();
            if (val && currentID) {
                if (!empireData[currentID]) empireData[currentID] = [];
                empireData[currentID].push(val);
                input.value = "";
                sync();
                renderMasterList();
            }
        }

        function toggleItem(text) {
            const key = `${currentID}-${text}`;
            statusData[key] = !statusData[key];
            sync();
            renderMasterList();
        }

        function removeItem(index) {
            const text = empireData[currentID][index];
            delete statusData[`${currentID}-${text}`];
            empireData[currentID].splice(index, 1);
            sync();
            renderMasterList();
        }

        function sync() {
            localStorage.setItem('empire_master_data', JSON.stringify(empireData));
            localStorage.setItem('empire_status_data', JSON.stringify(statusData));
        }

        document.getElementById('master-input').addEventListener("keypress", (e) => { if(e.key === "Enter") addNewItem(); });

        window.onload = init;
    </script>
</body>
</html>
