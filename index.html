<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية المتداولين | السحابة المركزية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #05050A;
            --text-main: #F8F8FF;
            --text-muted: #888899;
            --glass-bg: rgba(20, 20, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.07);
            --clr-1: #FFD700; --clr-2: #39FF14; --clr-3: #FF3131;
            --clr-4: #00FFFF; --clr-5: #BD00FF; --clr-6: #FF5E00;
            --clr-7: #00FF95; --clr-8: #FF007F; --clr-9: #EDEDED;
            --active-color: #39FF14;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif; background-color: var(--bg-base); color: var(--text-main);
            margin: 0; padding: 20px; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(40, 40, 70, 0.25), transparent 70%);
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        .view { display: none; animation: fadeIn 0.4s ease-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* لوحة الأقسام الرئيسية */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 20px auto; width: 100%; }
        .nav-card { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px 20px; text-align: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .nav-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); background: rgba(30, 30, 45, 0.8); border-color: rgba(255,255,255,0.15); }
        .card-icon { font-size: 3rem; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
        .card-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; }

        /* مؤشر السحابة */
        .sync-status { text-align: center; font-size: 0.95rem; color: var(--clr-2); font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 8px 18px; border-radius: 30px; width: fit-content; margin-left: auto; margin-right: auto; border: 1px solid rgba(57, 255, 20, 0.2); }

        /* حاوية التفاصيل */
        .detail-container { max-width: 1200px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; height: 92vh; }
        .btn-back { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #fff; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-family: 'Cairo'; font-weight: 600; margin-bottom: 15px; align-self: flex-start; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-back:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        
        .detail-glass-panel { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; flex-grow: 1; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.7); overflow: hidden; }
        
        .detail-header { display: flex; align-items: center; gap: 15px; font-size: 2.2rem; font-weight: 900; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.04); padding-bottom: 15px; text-shadow: 0 0 20px rgba(255,255,255,0.1); }

        /* القائمة الموحدة بتصميم العمودين */
        .master-list-wrapper { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; align-content: start; }
        .master-list-wrapper::-webkit-scrollbar { width: 5px; }
        .master-list-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        
        /* تصميم البطاقة الحديث */
        .item-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: rgba(255,255,255,0.02); padding: 15px 18px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.04); transition: all 0.3s ease; border-right: 4px solid var(--active-color); height: fit-content; }
        .item-row:hover { background: rgba(255,255,255,0.05); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.08); }
        
        .item-row.is-done { opacity: 0.5; filter: grayscale(100%); border-right-color: rgba(255,255,255,0.1); background: transparent; box-shadow: none; }
        .item-row.is-done .item-text { text-decoration: line-through; color: var(--text-muted); font-weight: 400; }

        .item-main { display: flex; align-items: flex-start; gap: 12px; flex: 1; cursor: pointer; user-select: none; }
        .item-text { color: #fff; font-size: 1.05rem; line-height: 1.5; font-weight: 600; word-break: break-word; transition: 0.3s; margin-top: 2px; }
        
        .item-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .btn-action { border: none; width: 38px; height: 38px; border-radius: 10px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        .btn-done { background: rgba(57, 255, 20, 0.1); color: var(--clr-2); }
        .btn-done:hover { background: var(--clr-2); color: #000; transform: scale(1.05); }
        .btn-delete { background: rgba(255, 50, 50, 0.1); color: #ff4444; }
        .btn-delete:hover { background: #ff4444; color: #fff; transform: scale(1.05); }

        /* منطقة الإدخال */
        .input-footer { display: flex; gap: 12px; background: rgba(0,0,0,0.4); padding: 15px 20px; border-radius: 18px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); align-items: center; }
        .input-footer input { flex: 1; background: transparent; border: none; color: #fff; font-family: 'Cairo'; font-size: 1.1rem; outline: none; width: 100%; }
        .input-footer input::placeholder { color: rgba(255,255,255,0.4); font-size: 1rem; }
        .input-footer button { background: var(--active-color); color: #000; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 900; font-family: 'Cairo'; font-size: 1.1rem; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .input-footer button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* ========================================= */
        /* التجاوب مع شاشات الموبايل (Responsive CSS) */
        /* ========================================= */
        @media (max-width: 900px) {
            .master-list-wrapper { grid-template-columns: 1fr; }
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .cards-grid { grid-template-columns: 1fr; gap: 15px; margin: 10px auto; }
            .nav-card { padding: 20px; border-radius: 16px; }
            .card-icon { font-size: 2.5rem; margin-bottom: 10px; }
            .card-title { font-size: 1.2rem; }
            
            .detail-container { height: 95vh; }
            .detail-glass-panel { padding: 15px; border-radius: 18px; }
            .detail-header { font-size: 1.6rem; gap: 10px; margin-bottom: 15px; padding-bottom: 10px; }
            
            .item-row { padding: 12px 15px; flex-direction: column; align-items: flex-start; gap: 15px; }
            .item-actions { width: 100%; justify-content: flex-end; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
            .item-text { font-size: 1rem; }
            .btn-action { width: 35px; height: 35px; font-size: 1rem; }

            .input-footer { padding: 10px 12px; border-radius: 14px; gap: 8px; }
            .input-footer input { font-size: 1rem; }
            /* إخفاء كلمة "إضافة" في الموبايل والاكتفاء بالأيقونة لتوفير مساحة للكتابة */
            .input-footer button span { display: none; }
            .input-footer button { padding: 12px 20px; border-radius: 10px; }
            
            .sync-status { font-size: 0.8rem; padding: 6px 15px; }
        }
    </style>
</head>
<body>

    <div id="dashboard-view" class="view active">
        <div class="sync-status" id="sync-status"><i class="fas fa-spinner fa-spin"></i> جاري الاتصال بالسحابة...</div>
        <div class="cards-grid" id="sections-grid"></div>
    </div>

    <div id="detail-view" class="view">
        <div class="detail-container">
            <button class="btn-back" onclick="exitSection()"><i class="fas fa-arrow-right"></i> العودة للوحة القيادة</button>
            <div class="detail-glass-panel">
                <div class="detail-header" id="header-el">
                    <i id="header-icon"></i> <span id="header-title"></span>
                </div>
                <div class="master-list-wrapper" id="master-list"></div>
                <div class="input-footer">
                    <input type="text" id="master-input" placeholder="أضف مهمة أو توجيه جديد هنا...">
                    <button id="btn-add-main" onclick="addNewItem()"><i class="fas fa-paper-plane"></i> <span>إرسال</span></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_API_URL = "https://api.jsonbin.io/v3/b/69e3ff94856a6821894b1a89";
        const CLOUD_API_KEY = "$2a$10$qg/zEcP90Y1YYOfOjaEGk.0jAq2BXhCgPTGSxHoJGRjMEbYo.fiBq";

        const initialSetup = {
            1: ["فحص بوابات الدفع وتأكيد استلام المبالغ.", "تفعيل حسابات الوكالة (IB) وربطها بالعملاء.", "عزل المشترين فوراً في الجروب المغلق.", "متابعة من سحبوا السلة (Cart Abandonment)."],
            2: ["إدارة جلسات التداول الحي في الجروب المغلق.", "المراقبة الصارمة للـ Drawdown واستبعاد المخالفين.", "إصدار لوحة الصدارة (Leaderboard) أسبوعياً.", "تحديد الفائزين النهائيين المؤهلين للسفر."],
            3: ["تصوير لقطات الهوك الحقيقية في السيت أب.", "مونتاج الريلز بـ After Effects والـ Zoom In/Out.", "توثيق المعسكر (فندق، قطار، تخييم) بجودة سينمائية.", "إنتاج الفلوقات اليومية للتسويق الفيروسي."],
            4: ["حجز تذاكر الطيران وتأشيرات الدخول.", "حجز مقصورات قطار النوم للتوثيق الميداني.", "توفير حلول إنترنت 5G وبنوك طاقة للتخييم."],
            5: ["كتابة سكربتات محتوى جذابة (FOMO وتعليمي).", "التواصل مع شركات التمويل لرعايات (B2B).", "نشر الريلز مع الوصف والهاشتاكات المستهدفة."],
            6: ["تخطيط الجولات السياحية في تايلند.", "تنسيق فعاليات ليلية لكسر ضغط التداول."],
            7: ["تصميم وطباعة تيشرتات الإمبراطورية.", "تجهيز حقائب ترحيبية (Welcome Kits)."],
            8: ["الرد على استفسارات المشترين 24/7.", "الدعم التقني لفتح حسابات الوكالة."],
            9: ["إدارة التحركات اليومية للفريق في تايلند.", "وضع خطة طوارئ (Plan B) لانقطاع الإنترنت."]
        };

        const config = {
            1: { title: "المالية والمبيعات", icon: "fa-wallet", color: "var(--clr-1)" },
            2: { title: "البرنامج التدريبي", icon: "fa-graduation-cap", color: "var(--clr-2)" },
            3: { title: "التصوير والإنتاج", icon: "fa-video", color: "var(--clr-3)" },
            4: { title: "العمليات والحجوزات", icon: "fa-map-marked-alt", color: "var(--clr-4)" },
            5: { title: "التسويق والرعايات", icon: "fa-ad", color: "var(--clr-5)" },
            6: { title: "البرنامج الترفيهي", icon: "fa-umbrella-beach", color: "var(--clr-6)" },
            7: { title: "المطبوعات والهوية", icon: "fa-print", color: "var(--clr-7)" },
            8: { title: "المتطوعون", icon: "fa-user-friends", color: "var(--clr-8)" },
            9: { title: "المنسق الميداني", icon: "fa-user-shield", color: "var(--clr-9)" }
        };

        let currentID = null;
        let empireData = {};
        let statusData = {};

        async function init() {
            const grid = document.getElementById('sections-grid');
            for (let id in config) {
                const s = config[id];
                const card = document.createElement('div');
                card.className = 'nav-card';
                card.style.borderTop = `6px solid ${s.color}`;
                card.innerHTML = `<div class="card-icon" style="color: ${s.color};"><i class="fas ${s.icon}"></i></div><div class="card-title">${s.title}</div>`;
                card.onclick = () => enterSection(id);
                grid.appendChild(card);
            }
            await loadFromCloud();
        }

        async function loadFromCloud() {
            const statusEl = document.getElementById('sync-status');
            try {
                let response = await fetch(CLOUD_API_URL, { headers: { 'X-Master-Key': CLOUD_API_KEY } });
                let data = await response.json();
                
                if (data.record && data.record.empireData) {
                    empireData = data.record.empireData;
                    statusData = data.record.statusData || {};
                    statusEl.innerHTML = '<i class="fas fa-check-circle"></i> متصل بالسحابة (مزامنة فورية)';
                    statusEl.style.color = "var(--clr-2)";
                    statusEl.style.borderColor = "rgba(57, 255, 20, 0.3)";
                } else {
                    empireData = initialSetup;
                    statusEl.innerHTML = '<i class="fas fa-cloud"></i> تم تهيئة السحابة بنجاح';
                }
            } catch (error) {
                empireData = JSON.parse(localStorage.getItem('empire_master_data')) || initialSetup;
                statusData = JSON.parse(localStorage.getItem('empire_status_data')) || {};
                statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> الحفظ المحلي (لا يوجد إنترنت)';
                statusEl.style.color = "var(--clr-3)";
                statusEl.style.borderColor = "rgba(255, 49, 49, 0.3)";
            }
        }

        async function syncToCloud() {
            localStorage.setItem('empire_master_data', JSON.stringify(empireData));
            localStorage.setItem('empire_status_data', JSON.stringify(statusData));

            try {
                await fetch(CLOUD_API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': CLOUD_API_KEY },
                    body: JSON.stringify({ empireData, statusData })
                });
            } catch (error) { console.error("فشل الرفع للسحابة", error); }
        }

        function enterSection(id) {
            currentID = id;
            document.getElementById('dashboard-view').classList.remove('active');
            document.getElementById('detail-view').classList.add('active');
            
            const s = config[id];
            document.documentElement.style.setProperty('--active-color', s.color);
            
            document.getElementById('header-icon').className = `fas ${s.icon}`;
            document.getElementById('header-title').innerText = s.title;
            document.getElementById('header-el').style.color = s.color;
            document.getElementById('btn-add-main').style.backgroundColor = s.color;
            document.getElementById('btn-add-main').style.color = "#000";
            
            renderMasterList();
        }

        function exitSection() {
            currentID = null;
            document.getElementById('detail-view').classList.remove('active');
            document.getElementById('dashboard-view').classList.add('active');
        }

        function renderMasterList() {
            const list = document.getElementById('master-list');
            list.innerHTML = "";
            const items = empireData[currentID] || [];

            items.forEach((text, index) => {
                const key = `${currentID}-${text}`;
                const isDone = statusData[key] ? 'is-done' : '';

                list.innerHTML += `
                    <div class="item-row ${isDone}" id="row-${index}">
                        <div class="item-main" onclick="toggleItem('${text}')" title="انقر لتغيير حالة الإنجاز">
                            <span class="item-text">${text}</span>
                        </div>
                        <div class="item-actions">
                            <button class="btn-action btn-done" onclick="toggleItem('${text}')" title="تحديد كمنجز"><i class="fas ${isDone ? 'fa-undo' : 'fa-check'}"></i></button>
                            <button class="btn-action btn-delete" onclick="removeItem(${index})" title="حذف نهائي"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            });
            list.scrollTop = list.scrollHeight;
        }

        function addNewItem() {
            const input = document.getElementById('master-input');
            const val = input.value.trim();
            if (val && currentID) {
                if (!empireData[currentID]) empireData[currentID] = [];
                empireData[currentID].push(val);
                input.value = "";
                syncToCloud();
                renderMasterList();
            }
        }

        function toggleItem(text) {
            const key = `${currentID}-${text}`;
            statusData[key] = !statusData[key];
            syncToCloud();
            renderMasterList();
        }

        function removeItem(index) {
            const text = empireData[currentID][index];
            delete statusData[`${currentID}-${text}`];
            empireData[currentID].splice(index, 1);
            syncToCloud();
            renderMasterList();
        }

        document.getElementById('master-input').addEventListener("keypress", (e) => { if(e.key === "Enter") addNewItem(); });

        window.onload = init;
    </script>
</body>
</html>
